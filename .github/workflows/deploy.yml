name: Deploy

on:
  push:
    branches:
      - main

jobs:
  # ─── 1. Deploy API to Render ─────────────────────────────────────────────
  deploy-api:
    name: Deploy API → Render
    runs-on: ubuntu-latest
    needs: check
    steps:
      - name: Trigger Render deploy hook
        run: |
          curl --silent --show-error --fail \
            "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

  # ─── 2. Build mobile app via EAS ─────────────────────────────────────────
  deploy-mobile:
    name: Build mobile → EAS (preview)
    runs-on: ubuntu-latest
    needs: check
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        # Run from monorepo root so all workspaces are linked
        run: npm ci
        working-directory: .

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build (preview — all platforms)
        run: eas build --profile preview --platform all --non-interactive
