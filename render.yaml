services:
  - type: web
    name: dayframe-api
    runtime: node
    region: oregon
    plan: free

    # Monorepo root — turbo must run from here
    rootDir: .

    # Install all workspace deps from monorepo root, then build only the API via turbo
    buildCommand: npm install --include=dev && npx prisma generate && npx turbo run build --filter=@dayframe/api

    startCommand: npx prisma migrate deploy && node apps/api/dist/src/main.js

    healthCheckPath: /health

    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
