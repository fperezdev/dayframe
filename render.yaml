services:
  - type: web
    name: dayframe-api
    runtime: node
    region: oregon
    plan: free

    # Monorepo root — turbo must run from here
    rootDir: .

    # Install all workspace deps from monorepo root, then build only the API via turbo
    buildCommand: npm install && npx prisma generate --schema=apps/api/prisma/schema.prisma && npx prisma migrate deploy --schema=apps/api/prisma/schema.prisma && npx turbo run build --filter=@dayframe/api

    startCommand: node apps/api/dist/main.js

    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false          # Set manually in Render dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
